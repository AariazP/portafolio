<section class="relative py-24 lg:py-32">
  <div class="absolute bottom-8 right-8 hidden lg:block pointer-events-none opacity-[0.04] font-mono text-[11px] leading-relaxed text-default">
    <span class="text-muted-light">$ terraform plan</span><br>
    <span class="text-green-500">+ resource "aws_instance" "app"</span><br>
    <span class="text-muted-light ml-4">ami: ami-0c55b159cbfafe1f0</span><br>
    <span class="text-muted-light ml-4">type: t3.small</span><br>
    <span class="text-accent">Plan: 1 to add, 0 to change, 0 to destroy.</span>
  </div>
  <div class="max-w-6xl mx-auto px-6 lg:px-12">
    <div class="grid lg:grid-cols-5 gap-12 lg:gap-20 items-center">
      <div class="lg:col-span-2" scrollReveal>
        <div class="relative">
          <div class="absolute -inset-4 rounded-3xl opacity-30"
            style="background: linear-gradient(135deg, var(--color-accent), transparent 60%)"></div>
          <img src="assets/imgs/profile.jpg" alt="Alejandro Arias"
            class="relative w-full rounded-2xl shadow-image">
        </div>
      </div>
      <div class="lg:col-span-3" scrollReveal [delay]="200">
        <h2 class="text-3xl lg:text-4xl font-extrabold mb-2 text-default">{{'DESC.NAME' | translate}}</h2>
        <div class="h-1 w-16 rounded-full mb-6" style="background: linear-gradient(90deg, var(--color-accent), transparent)"></div>
        @for (p of paragraphs; track p) {
          <p class="text-muted text-base font-light leading-relaxed mb-4">{{ p | translate }}</p>
        }
      </div>
    </div>
  </div>
</section>
