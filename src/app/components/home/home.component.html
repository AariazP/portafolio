<section class="relative min-h-screen flex items-center overflow-hidden" id="inicio">
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 rounded-full opacity-[0.08]" style="background: radial-gradient(circle, var(--color-accent) 0%, transparent 70%)"></div>
    <div class="absolute bottom-1/4 right-1/4 w-80 h-80 rounded-full opacity-[0.06]" style="background: radial-gradient(circle, var(--color-accent) 0%, transparent 70%)"></div>
  </div>

  <div class="relative w-full max-w-6xl mx-auto px-6 lg:px-12 pt-24 pb-12">
    <div class="grid lg:grid-cols-2 gap-12 lg:gap-20 items-center">
      <div class="text-center lg:text-left" scrollReveal>
        <span class="section-chip mb-6">
          <i class="bi bi-hand-wave"></i>{{'HOME.SALUDO' | translate}}
        </span>
        <h1 class="text-4xl sm:text-5xl lg:text-6xl font-extrabold leading-[1.1] mb-4 text-default">
          {{'HOME.NOMBRE' | translate}}
        </h1>
        <p class="text-lg text-muted font-light leading-relaxed mb-8 max-w-lg lg:mx-0 mx-auto">
          {{'HOME.DESCRIPCION' | translate}}
        </p>
        <div class="flex flex-col sm:flex-row items-center gap-4 mb-10">
          <button (click)="irWhatsApp()"
            class="group relative inline-flex items-center gap-3 px-8 py-3.5 rounded-2xl font-semibold text-white cursor-pointer border-none transition-all duration-500 hover:-translate-y-0.5"
            style="background: linear-gradient(135deg, var(--color-accent), #a78bfa)">
            <span class="absolute inset-0 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"
              style="background: linear-gradient(135deg, #a78bfa, var(--color-accent))"></span>
            <span class="relative flex items-center gap-3">
              <i class="bi bi-whatsapp text-lg"></i>
              {{'HOME.HABLEMOS' | translate}}
            </span>
          </button>
          <button (click)="descargarCV()"
            class="inline-flex items-center gap-2 px-6 py-3.5 rounded-2xl font-medium text-muted hover:text-accent hover:bg-accent-light cursor-pointer border border-[var(--color-border)] bg-transparent transition-all duration-300">
            <i class="bi bi-download"></i>
            {{'HOME.DOWNLOAD' | translate}}
          </button>
        </div>
        <div class="flex items-center gap-3 justify-center lg:justify-start">
          <span class="text-xs text-muted-light uppercase tracking-widest mr-2">{{'HOME.SALUDO' | translate}}</span>
          <div class="h-px w-8 bg-border"></div>
          @for (social of socials; track social.name) {
            <a [href]="social.url" target="_blank"
              class="w-10 h-10 flex items-center justify-center rounded-xl text-muted-light hover:text-accent hover:bg-accent-light no-underline transition-all duration-300">
              <i [class]="social.icon + ' text-lg'"></i>
            </a>
          }
        </div>
      </div>

      <div class="relative flex justify-center lg:justify-end" scrollReveal [delay]="200">
        <div class="relative w-72 h-72 sm:w-80 sm:h-80 lg:w-96 lg:h-96">
          <div class="absolute inset-0 rounded-full opacity-20 animate-pulse-glow"
            style="background: radial-gradient(circle, var(--color-accent) 0%, transparent 70%)"></div>
          <div class="absolute inset-2 rounded-full border-2 border-dashed opacity-20"
            style="border-color: var(--color-accent); animation: spin 30s linear infinite"></div>
          <img src="assets/imgs/image+icons.png" alt="Alejandro Arias"
            class="relative w-full h-full object-contain drop-shadow-2xl">
        </div>
      </div>
    </div>
  </div>
</section>
