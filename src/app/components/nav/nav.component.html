<nav [ngClass]="isScrolled ? 'glass shadow-card' : 'bg-transparent'"
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-500">

  <div class="flex items-center justify-between px-6 lg:px-12 py-4">
    <a href="#inicio" class="text-lg font-semibold tracking-tight no-underline text-default">
      <span class="gradient-text">A.</span>Arias
    </a>

    <button (click)="toggleMenu()"
      class="lg:hidden bg-transparent border-none cursor-pointer p-2 rounded-lg hover:bg-accent-dim transition-colors"
      aria-label="Menu">
      <div class="w-5 h-4 relative flex flex-col justify-between">
        <span class="block h-[2px] bg-default rounded transition-all duration-300"
          [ngClass]="isMenuOpen ? 'rotate-45 translate-y-[7px]' : ''"></span>
        <span class="block h-[2px] bg-default rounded transition-all duration-300"
          [ngClass]="isMenuOpen ? 'opacity-0' : ''"></span>
        <span class="block h-[2px] bg-default rounded transition-all duration-300"
          [ngClass]="isMenuOpen ? '-rotate-45 -translate-y-[7px]' : ''"></span>
      </div>
    </button>

    <div [ngClass]="[
      'lg:flex items-center gap-1',
      isMenuOpen ? 'flex flex-col fixed top-16 left-4 right-4 glass rounded-2xl p-4 gap-1 shadow-card' : 'hidden'
    ]">
      @for (item of navItems; track item.id) {
        <a [href]="'#' + item.id" (click)="isMenuOpen = false"
          class="block px-4 py-2 text-sm text-muted hover:text-accent hover:bg-accent-light rounded-xl no-underline transition-all duration-300">
          {{ item.label | translate }}
        </a>
      }

      <div class="relative group lg:ml-2">
        <span class="block px-4 py-2 text-sm text-muted rounded-xl cursor-pointer transition-colors hover:text-accent hover:bg-accent-light">
          <i class="bi bi-globe2 mr-1.5"></i>{{'NAV.ITEM_6' | translate}}
        </span>
        <div class="hidden group-hover:block absolute top-full right-0 glass border rounded-xl p-1.5 min-w-[130px] shadow-card">
          @for (lang of languages; track lang.code) {
            <button (click)="switchLang(lang.code)"
              class="block w-full text-left px-3 py-2 text-sm text-muted hover:text-accent hover:bg-accent-light rounded-lg bg-transparent border-none cursor-pointer transition-colors">
              {{ lang.flag }} {{ lang.name }}
            </button>
          }
        </div>
      </div>
    </div>
  </div>
</nav>
