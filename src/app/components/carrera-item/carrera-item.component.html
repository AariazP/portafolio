@if (type === 'experience') {
  <div class="mb-8 relative" scrollReveal>
    <div class="flex items-baseline gap-3 mb-2">
      <span class="text-xs font-semibold text-muted-light uppercase tracking-wider whitespace-nowrap">{{fecha}}</span>
      <span class="text-[11px] font-medium px-2 py-0.5 rounded-full whitespace-nowrap"
        style="background: var(--color-accent-dim); color: var(--color-accent)">
        {{duracion}}
      </span>
    </div>
    <h4 class="text-base font-bold text-default">{{title}}</h4>
    @if (subtitle) {
      <span class="text-sm font-medium block mb-1.5" style="color: var(--color-accent)">{{subtitle}}</span>
    }
    <p class="text-sm text-muted font-light leading-relaxed mb-3">{{parrafo}}</p>
    @if (skills) {
      <div class="flex flex-wrap gap-1.5">
        @for (skill of skills.split(', '); track skill) {
          <span class="px-2 py-0.5 rounded text-[11px] font-medium"
            style="background: var(--color-accent-dim); color: var(--color-accent)">
            {{skill}}
          </span>
        }
      </div>
    }
  </div>
} @else {
  <div class="card-hover p-5 mb-6" scrollReveal>
    @if (img) {
      <img [src]="img" alt="{{title}}" loading="lazy" class="w-full max-h-36 object-contain rounded-xl mb-4 bg-secondary p-3">
    }
    <h4 class="text-base font-bold text-default mb-2">{{title}}</h4>
    <p class="text-sm text-muted font-light leading-relaxed mb-4">{{parrafo}}</p>
    <div class="flex items-center gap-4 text-xs text-muted-light">
      <span class="inline-flex items-center gap-1.5">{{fecha}}</span>
      <span class="inline-flex items-center gap-1.5">{{duracion}}</span>
    </div>
  </div>
}
