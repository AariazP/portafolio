<div class="card-hover p-5 mb-6" scrollReveal>
  <h4 class="text-base font-bold text-default mb-2">{{title}}</h4>
  <p class="text-sm text-muted font-light leading-relaxed mb-4">{{parrafo}}</p>
  @if (img) {
    <img [src]="img" alt="{{title}}" loading="lazy" class="w-full max-h-36 object-cover rounded-xl mb-4">
  }
  <div class="flex items-center gap-4 text-xs text-muted-light">
    <span class="inline-flex items-center gap-1.5"><i class="bi bi-calendar3"></i> {{fecha}}</span>
    <span class="inline-flex items-center gap-1.5"><i class="bi bi-clock"></i> {{duracion}}</span>
  </div>
</div>
