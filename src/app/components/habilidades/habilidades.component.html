<section class="relative py-24 lg:py-32" id="habilidades">
  <div class="max-w-6xl mx-auto px-6 lg:px-12">
    <div class="text-center mb-16" scrollReveal>
      <h2 class="text-3xl lg:text-5xl font-extrabold text-default">{{'HABILIDADES.SUBTITLE_1' | translate}}</h2>
    </div>

    @for (group of groups; track group.subtitle; let gIdx = $index) {
      <div class="mb-16 last:mb-0" scrollReveal [delay]="gIdx * 150">
        <div class="flex items-center gap-4 mb-8">
          <div class="h-px flex-1" style="background: var(--color-border)"></div>
          <span class="text-xs font-semibold text-muted-light uppercase tracking-widest whitespace-nowrap">{{ group.subtitle | translate }}</span>
          <div class="h-px flex-1" style="background: var(--color-border)"></div>
        </div>
        <div class="flex flex-wrap justify-center gap-3">
          @for (skill of group.items; track skill.name; let sIdx = $index) {
            <div class="flex items-center gap-3 px-5 py-3 rounded-2xl transition-all duration-500 cursor-default hover:shadow-glow" scrollReveal [delay]="sIdx * 30"
              style="background: var(--color-accent-light); border: 1px solid var(--color-border)">
              <i [class]="skill.icon + ' text-xl text-muted-light transition-all duration-500'"></i>
              <span class="text-sm font-medium text-muted transition-all duration-500">{{ skill.name }}</span>
            </div>
          }
        </div>
      </div>
    }
  </div>
</section>
