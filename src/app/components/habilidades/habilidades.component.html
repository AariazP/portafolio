<section class="py-20 px-8" id="habilidades">
  <div class="max-w-[1200px] mx-auto">
    <div class="text-center mb-12">
      <span class="inline-block bg-accent-dim text-accent px-4 py-1.5 rounded-full text-sm font-semibold mb-4">{{'HABILIDADES.TITLE' | translate}}</span>
      <h2 class="text-4xl font-bold max-md:text-3xl text-default">{{'HABILIDADES.SUBTITLE_1' | translate}}</h2>
    </div>

    <div class="max-w-[900px] mx-auto mb-16">
      <p class="text-center text-2xl font-light text-muted mb-8">{{'HABILIDADES.SUBTITLE_1' | translate}}</p>
      <div class="flex flex-wrap justify-center gap-6">
        @for (skill of dailySkills; track skill.name) {
          <div class="flex flex-col items-center gap-2 px-6 py-5 bg-secondary border rounded-xl min-w-[100px] transition-all duration-300 hover:border-accent hover:-translate-y-1 hover:shadow-accent-md">
            <i [class]="skill.icon + ' text-3xl text-muted-light'"></i>
            <span class="text-sm text-muted font-light">{{ skill.name }}</span>
          </div>
        }
      </div>
    </div>

    <div class="max-w-[900px] mx-auto">
      <p class="text-center text-2xl font-light text-muted mb-8">{{'HABILIDADES.SUBTITLE_2' | translate}}</p>
      <div class="flex flex-wrap justify-center gap-6">
        @for (skill of workSkills; track skill.name) {
          <div class="flex flex-col items-center gap-2 px-6 py-5 bg-secondary border rounded-xl min-w-[100px] transition-all duration-300 hover:border-accent hover:-translate-y-1 hover:shadow-accent-md">
            <i [class]="skill.icon + ' text-3xl text-muted-light'"></i>
            <span class="text-sm text-muted font-light">{{ skill.name }}</span>
          </div>
        }
      </div>
    </div>
  </div>
</section>
